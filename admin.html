<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHZ Admin — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07); --text: #f0f0f8; --muted: #7070a0;
    --accent: #e8c86a; --red: #e85a5a; --green: #5ae8a0;
    --t1: #e85a8a; --t2: #5ae8c8; --t3: #e8a85a; --t4: #8a5ae8;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 400px;
    text-align: center;
  }
  .login-card .logo-mark {
    width: 56px; height: 56px; background: var(--accent);
    border-radius: 14px; display: grid; place-items: center;
    font-family: 'Playfair Display', serif; font-size: 24px;
    font-weight: 900; color: #0a0a0f; margin: 0 auto 1.5rem;
  }
  .login-card h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
  .login-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

  /* SHARED FORM STYLES */
  .field { margin-bottom: 1.25rem; text-align: left; }
  .field label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 0.75rem 1rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field select option { background: #1a1a26; }
  .field textarea { resize: vertical; min-height: 70px; }

  .btn {
    width: 100%; padding: 0.85rem;
    background: var(--accent); border: none; border-radius: 10px;
    color: #0a0a0f; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn.danger { background: var(--red); color: #fff; }
  .btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn.sm { width: auto; padding: 0.45rem 1rem; font-size: 0.8rem; }

  .error-msg { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; text-align: center; }
  .success-msg { color: var(--green); font-size: 0.8rem; margin-top: 0.75rem; text-align: center; }

  /* ADMIN LAYOUT */
  #admin-ui { display: none; }
  .admin-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .admin-header .logo { display: flex; align-items: center; gap: 0.75rem; }
  .admin-header .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: #0a0a0f; }
  .admin-title { font-weight: 600; font-size: 0.95rem; }
  .admin-sub { font-size: 0.7rem; color: var(--muted); }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.9rem; color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .logout-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .admin-body {
    max-width: 1200px; margin: 0 auto;
    padding: 2rem;
    display: grid; grid-template-columns: 380px 1fr; gap: 2rem;
    align-items: start;
  }
  @media (max-width: 800px) { .admin-body { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem;
    padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }

  /* PRIZE GROUP */
  .prize-group {
    background: var(--surface2); border-radius: 12px;
    padding: 1rem; margin-bottom: 1rem;
  }
  .prize-group-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .prize-row-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  /* TABLE */
  .results-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left; padding: 0.6rem 0.75rem;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  td { padding: 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .prog-badge {
    display: inline-block; padding: 0.15rem 0.5rem;
    border-radius: 4px; font-size: 0.7rem; font-weight: 600;
    background: rgba(232,200,106,0.1); color: var(--accent);
  }

  .action-btns { display: flex; gap: 0.5rem; }

  .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
  .tag-gold { background: rgba(232,200,106,0.15); color: var(--accent); }
  .tag-silver { background: rgba(176,184,208,0.15); color: #b0b8d0; }
  .tag-bronze { background: rgba(212,132,90,0.15); color: #d4845a; }

  .empty-row td { text-align: center; color: var(--muted); padding: 2.5rem; }

  .msg-bar {
    padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1rem;
    font-size: 0.85rem; display: none;
  }
  .msg-bar.success { background: rgba(90,232,160,0.1); border: 1px solid rgba(90,232,160,0.25); color: var(--green); display: block; }
  .msg-bar.error { background: rgba(232,90,90,0.1); border: 1px solid rgba(232,90,90,0.25); color: var(--red); display: block; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(10,10,15,0.3); border-top-color: #0a0a0f; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.4rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MANAGE PROGRAMMES */
  .prog-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
  .prog-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); border-radius: 8px; padding: 0.6rem 0.9rem;
    font-size: 0.85rem;
  }
  .prog-item-name { font-weight: 500; }
  .prog-item-cat { font-size: 0.7rem; color: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="logo-mark">F</div>
    <h2>Admin Portal</h2>
    <p>FHZ Art Fest — Results Management</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-err"></div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="admin-ui">
  <div class="admin-header">
    <div class="logo">
      <div class="logo-mark">F</div>
      <div>
        <div class="admin-title">Results Admin</div>
        <div class="admin-sub">FHZ Art Fest 2024</div>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center">
      <a href="students_admin.html" style="color:var(--muted);font-size:0.8rem;text-decoration:none;">Students Admin →</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- LEFT: Form -->
    <div>
      <div class="panel">
        <div class="panel-title" id="form-title">✦ Add Programme Result</div>
        <div class="msg-bar" id="form-msg"></div>

        <input type="hidden" id="editing-id">

        <div class="field">
          <label>Programme Name *</label>
          <input type="text" id="f-prog" placeholder="e.g. Solo Dance, Elocution...">
        </div>
        <div class="field">
          <label>Category</label>
          <input type="text" id="f-cat" placeholder="e.g. Dance, Music, Literary...">
        </div>
        <div class="field">
          <label>Emoji Icon</label>
          <input type="text" id="f-emoji" placeholder="🎭" maxlength="4">
        </div>
        <div class="field">
          <label>Banner Image URL (optional)</label>
          <input type="url" id="f-banner" placeholder="https://...">
        </div>

        <!-- 1st Prize -->
        <div class="prize-group">
          <div class="prize-group-label">🥇 1st Prize</div>
          <div class="field"><label>Student Name</label><input type="text" id="f-1-name" placeholder="Name"></div>
          <div class="prize-row-fields">
            <div class="field"><label>Team</label>
              <select id="f-1-team">
                <option value="">— Team —</option>
                <option value="1">Team Alpha</option>
                <option value="2">Team Beta</option>
                <option value="3">Team Gamma</option>
                <option value="4">Team Delta</option>
              </select>
            </div>
            <div class="field"><label>Grade</label>
              <select id="f-1-grade">
                <option value="">— Grade —</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Chest Numbers (comma-separated)</label><input type="text" id="f-1-chests" placeholder="101, 102"></div>
        </div>

        <!-- 2nd Prize -->
        <div class="prize-group">
          <div class="prize-group-label">🥈 2nd Prize</div>
          <div class="field"><label>Student Name</label><input type="text" id="f-2-name" placeholder="Name"></div>
          <div class="prize-row-fields">
            <div class="field"><label>Team</label>
              <select id="f-2-team">
                <option value="">— Team —</option>
                <option value="1">Team Alpha</option>
                <option value="2">Team Beta</option>
                <option value="3">Team Gamma</option>
                <option value="4">Team Delta</option>
              </select>
            </div>
            <div class="field"><label>Grade</label>
              <select id="f-2-grade">
                <option value="">— Grade —</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Chest Numbers (comma-separated)</label><input type="text" id="f-2-chests" placeholder="201, 202"></div>
        </div>

        <!-- 3rd Prize -->
        <div class="prize-group">
          <div class="prize-group-label">🥉 3rd Prize</div>
          <div class="field"><label>Student Name</label><input type="text" id="f-3-name" placeholder="Name"></div>
          <div class="prize-row-fields">
            <div class="field"><label>Team</label>
              <select id="f-3-team">
                <option value="">— Team —</option>
                <option value="1">Team Alpha</option>
                <option value="2">Team Beta</option>
                <option value="3">Team Gamma</option>
                <option value="4">Team Delta</option>
              </select>
            </div>
            <div class="field"><label>Grade</label>
              <select id="f-3-grade">
                <option value="">— Grade —</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Chest Numbers (comma-separated)</label><input type="text" id="f-3-chests" placeholder="301"></div>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
          <button class="btn" onclick="submitResult()" id="submit-btn">Submit Result</button>
          <button class="btn secondary sm" onclick="clearForm()" style="flex-shrink:0">Clear</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Table -->
    <div>
      <div class="panel">
        <div class="panel-title">All Programme Results</div>
        <div class="results-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Programme</th>
                <th>Category</th>
                <th>1st</th>
                <th>2nd</th>
                <th>3rd</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="results-tbody">
              <tr class="empty-row"><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TEAMS = { 1: 'Alpha', 2: 'Beta', 3: 'Gamma', 4: 'Delta' };

// ── AUTH ────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('login-pw').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('fhz_admin', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-ui').style.display = 'block';
    loadResults();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
  }
}

function logout() {
  sessionStorage.removeItem('fhz_admin');
  location.reload();
}

if (sessionStorage.getItem('fhz_admin')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-ui').style.display = 'block';
}

// ── FORM ────────────────────────────────────────────────────────────────
function getFormData() {
  return {
    programme_name: document.getElementById('f-prog').value.trim(),
    category: document.getElementById('f-cat').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim(),
    banner_url: document.getElementById('f-banner').value.trim(),
    first_name: document.getElementById('f-1-name').value.trim(),
    first_team_id: parseInt(document.getElementById('f-1-team').value) || null,
    first_grade: document.getElementById('f-1-grade').value,
    first_chest_numbers: document.getElementById('f-1-chests').value.trim(),
    second_name: document.getElementById('f-2-name').value.trim(),
    second_team_id: parseInt(document.getElementById('f-2-team').value) || null,
    second_grade: document.getElementById('f-2-grade').value,
    second_chest_numbers: document.getElementById('f-2-chests').value.trim(),
    third_name: document.getElementById('f-3-name').value.trim(),
    third_team_id: parseInt(document.getElementById('f-3-team').value) || null,
    third_grade: document.getElementById('f-3-grade').value,
    third_chest_numbers: document.getElementById('f-3-chests').value.trim(),
  };
}

function clearForm() {
  ['f-prog','f-cat','f-emoji','f-banner','f-1-name','f-1-chests','f-2-name','f-2-chests','f-3-name','f-3-chests'].forEach(id => document.getElementById(id).value = '');
  ['f-1-team','f-1-grade','f-2-team','f-2-grade','f-3-team','f-3-grade'].forEach(id => document.getElementById(id).selectedIndex = 0);
  document.getElementById('editing-id').value = '';
  document.getElementById('form-title').textContent = '✦ Add Programme Result';
  document.getElementById('submit-btn').textContent = 'Submit Result';
  document.getElementById('form-msg').className = 'msg-bar';
}

function showMsg(text, type) {
  const el = document.getElementById('form-msg');
  el.textContent = text; el.className = 'msg-bar ' + type;
  setTimeout(() => { el.className = 'msg-bar'; }, 4000);
}

async function submitResult() {
  const data = getFormData();
  if (!data.programme_name) { showMsg('Programme name is required.', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '<span class="spinner"></span>Saving...';
  btn.disabled = true;

  const editingId = document.getElementById('editing-id').value;
  let error;

  if (editingId) {
    ({ error } = await sb.from('results').update(data).eq('id', editingId));
  } else {
    ({ error } = await sb.from('results').insert(data));
  }

  btn.disabled = false;
  btn.textContent = editingId ? 'Update Result' : 'Submit Result';

  if (error) { showMsg('Error: ' + error.message, 'error'); return; }
  showMsg(editingId ? 'Result updated!' : 'Result added successfully!', 'success');
  clearForm();
  loadResults();
}

// ── TABLE ────────────────────────────────────────────────────────────────
async function loadResults() {
  const { data } = await sb.from('results').select('*').order('created_at', { ascending: false });
  const tbody = document.getElementById('results-tbody');
  if (!data?.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No results yet. Add one!</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td><strong>${r.programme_name}</strong></td>
      <td><span class="prog-badge">${r.category || '—'}</span></td>
      <td>${r.first_name ? `<span class="tag tag-gold">${r.first_name}</span><br><small style="color:var(--muted)">${TEAMS[r.first_team_id] || ''}${r.first_grade ? ' · '+r.first_grade : ''}</small>` : '—'}</td>
      <td>${r.second_name ? `<span class="tag tag-silver">${r.second_name}</span><br><small style="color:var(--muted)">${TEAMS[r.second_team_id] || ''}${r.second_grade ? ' · '+r.second_grade : ''}</small>` : '—'}</td>
      <td>${r.third_name ? `<span class="tag tag-bronze">${r.third_name}</span><br><small style="color:var(--muted)">${TEAMS[r.third_team_id] || ''}${r.third_grade ? ' · '+r.third_grade : ''}</small>` : '—'}</td>
      <td>
        <div class="action-btns">
          <button class="btn secondary sm" onclick="editResult('${r.id}')">Edit</button>
          <button class="btn danger sm" onclick="deleteResult('${r.id}')">Del</button>
        </div>
      </td>
    </tr>`).join('');
}

async function editResult(id) {
  const { data } = await sb.from('results').select('*').eq('id', id).single();
  if (!data) return;
  document.getElementById('f-prog').value = data.programme_name || '';
  document.getElementById('f-cat').value = data.category || '';
  document.getElementById('f-emoji').value = data.emoji || '';
  document.getElementById('f-banner').value = data.banner_url || '';
  document.getElementById('f-1-name').value = data.first_name || '';
  document.getElementById('f-1-team').value = data.first_team_id || '';
  document.getElementById('f-1-grade').value = data.first_grade || '';
  document.getElementById('f-1-chests').value = data.first_chest_numbers || '';
  document.getElementById('f-2-name').value = data.second_name || '';
  document.getElementById('f-2-team').value = data.second_team_id || '';
  document.getElementById('f-2-grade').value = data.second_grade || '';
  document.getElementById('f-2-chests').value = data.second_chest_numbers || '';
  document.getElementById('f-3-name').value = data.third_name || '';
  document.getElementById('f-3-team').value = data.third_team_id || '';
  document.getElementById('f-3-grade').value = data.third_grade || '';
  document.getElementById('f-3-chests').value = data.third_chest_numbers || '';
  document.getElementById('editing-id').value = id;
  document.getElementById('form-title').textContent = '✏️ Edit Result';
  document.getElementById('submit-btn').textContent = 'Update Result';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteResult(id) {
  if (!confirm('Delete this result? This cannot be undone.')) return;
  await sb.from('results').delete().eq('id', id);
  loadResults();
}

// Realtime refresh
if (sessionStorage.getItem('fhz_admin')) {
  sb.channel('admin-results').on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, loadResults).subscribe();
}
</script>
</body>
</html>
